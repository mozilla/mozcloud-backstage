name: release

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------
  # Push to main → release-please opens/updates the Release PR.
  # When the Release PR merges, the next main run pushes the vX.Y.Z
  # tag and creates the GitHub Release. The existing "build and push
  # to GAR" workflow triggers on that tag and builds the image with
  # the released version (it tags from `git describe --tags`).
  # -----------------------------------------------------------------
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
