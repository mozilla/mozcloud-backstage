---
name: build and push to GAR
on:
  push:
    branches:
      - main

  # Called by release.yml after release-please creates a release/tag. A
  # tag-push by release-please can't trigger a workflow on its own (it's
  # pushed with the default GITHUB_TOKEN, which never triggers further
  # workflows), so the release workflow invokes this one explicitly and
  # passes the released tag.
  workflow_call:
    inputs:
      tag:
        description: >-
          Explicit image tag (e.g. v1.2.3). When empty (the push trigger),
          the tag is derived from `git describe`.
        required: false
        type: string
        default: ''

jobs:
  build-and-push:
    strategy:
      matrix:
        include:
          - gcp_project_id: moz-fx-backstage-prod
            gar_repo: backstage-prod

    name: build and push
    runs-on: ubuntu-latest
    environment: build
    permissions:
      contents: read
      id-token: write

    steps:
      - id: checkout-application-repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-tag
        run: |-
          if [ -n "${{ inputs.tag }}" ]; then
            echo "TAG=${{ inputs.tag }}" | tee -a "${GITHUB_OUTPUT}"
          else
            echo "TAG=$(git describe --tags --abbrev=7)" | tee -a "${GITHUB_OUTPUT}"
          fi

      - uses: docker/setup-buildx-action@v3

      - id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          service_account: artifact-writer@${{ matrix.gcp_project_id }}.iam.gserviceaccount.com
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_POOL_PROJECT_NUMBER }}

      - uses: docker/login-action@v3
        name: Docker login
        with:
          registry: us-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - id: build-and-push-backstage
        uses: docker/build-push-action@v6
        with:
          context: . # Expecting the multi-stage build from here: https://backstage.io/docs/deployment/docker/#multi-stage-build
          tags: |
            us-docker.pkg.dev/${{ matrix.gcp_project_id }}/${{ matrix.gar_repo }}/moz-backstage-app:${{ steps.set-tag.outputs.TAG }}
            us-docker.pkg.dev/${{ matrix.gcp_project_id }}/${{ matrix.gar_repo }}/moz-backstage-app:latest

          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
