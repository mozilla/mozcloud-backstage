globals:
  version: v1alpha1
  app_code: fxa
  function: webservices
  risk_level: high
  risk_rating:
    confidentiality: 4
    integrity: 4
    availability: 4
  risk_uuid: d189d104-70e5-444a-815b-a933e66f9bf0
  extra_attributes:
    pod_security: privileged
  application_ports:
    - 8080
    - 8081
    - 3128
    - 13133
  deployment:
    type: argocd
    charts:
      fxa:
        application_repository: mozilla/fxa
        images:
          fxa-mono: {}
  entitlements:
    enabled: true
    additional_entitlements:
      - name: admin-ent
        roles:
          - roles/compute.admin
          - roles/dns.admin
          - roles/storage.admin
          - roles/spanner.admin
          - roles/cloudsql.admin
        principals:
          - workgroup:fxa/developers
        approval_workflow:
          principals:
            - workgroup:fxa/developers
      - name: secret-add-access
        roles:
          - roles/secretmanager.secretAccessor
          - roles/secretmanager.secretVersionAdder
        principals:
          - workgroup:fxa/developers
        approval_workflow:
          principals:
            - workgroup:fxa/developers
    additional_roles: []
  workgroups:
    - fxa
  capabilities:
    entitlements: enabled
