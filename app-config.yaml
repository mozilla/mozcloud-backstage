app:
  title: Mozcloud Service Catalog
  baseUrl: http://localhost:3000
  analytics:
    glean:
      appId: moz_backstage
      debug:
        logging: false
        tag: backstage-dev

      enabled: true
      environment: development
  extensions:
    # Mount the home plugin's page at the root path (instead of /home).
    - page:home:
        config:
          path: /

    # The home plugin ships these as opt-in (disabled: true). Enable both
    # so HomePageRecentlyVisited / HomePageTopVisited have an API to query.
    - api:home/visits: true
    - app-root-element:home/visit-listener: true
    - entity-content:catalog/diagram: false
    - page:catalog/entity:
        config:
          # Show icons next to group and tab titles
          showNavItemIcons: true
          defaultContentOrder: natural

    - entity-card:org/user-profile:
        config:
          showLinks: true

    - entity-card:org/group-profile:
        config:
          showLinks: true

    - entity-card:catalog/about:
        config:
          type: info
          filter:
            $not: { kind: { $in: [Group, User] } }

    - entity-card:catalog/links:
        config:
          type: info

    - entity-card:catalog/gcp-project:
        config:
          type: content

    - entity-card:catalog/mozcloud-chart:
        config:
          type: content

    # Default the Group "Members" card to aggregated view so subgroup
    # members appear without having to toggle. The toggle remains
    # available for switching back to direct-only.
    - entity-card:org/members-list:
        config:
          type: info

    - entity-card:org/ownership:
        config:
          type: content
          initialRelationAggregation: aggregated
          filter: { kind: { $in: [Group, User] } }

    - entity-card:grafana/dashboards:
        config:
          type: content
          filter: { kind: { $in: [Component, System] } }

    - entity-card:grafana/alerts: false

    - entity-card:api-docs/provided-apis:
        config:
          filter: { spec.providesApis: { $exists: true } }
    - entity-card:api-docs/consumed-apis:
        config:
          filter: { spec.consumesApis: { $exists: true } }
    - entity-card:catalog/depends-on-components:
        config:
          filter: { spec.dependsOn: { $exists: true } }
    - entity-card:catalog/depends-on-resources:
        config:
          filter: { spec.dependsOn: { $exists: true } }
    # `has-*` cards need to filter on the derived `relations` array, not
    # `spec.hasPart`. The parent rarely has `spec.hasPart` set — children
    # declare `spec.subcomponentOf` / `spec.system` / `spec.domain` and
    # the catalog processor derives the inverse `hasPart` relation on
    # the parent. The `spec.*` predicate misses that.
    - entity-card:catalog/has-components:
        config:
          type: info
          filter:
            kind: system
            relations:
              $contains:
                type: hasPart
                targetRef: { $hasPrefix: 'component:' }
    - entity-card:catalog/has-resources:
        config:
          type: info
          filter:
            kind: system
            relations:
              $contains:
                type: hasPart
                targetRef: { $hasPrefix: 'resource:' }
    - entity-card:catalog/has-subcomponents:
        config:
          type: info
          filter:
            kind: component
            relations:
              $contains:
                type: hasPart
                targetRef: { $hasPrefix: 'component:' }
    - entity-card:catalog/has-subdomains:
        config:
          filter:
            kind: domain
            relations:
              $contains:
                type: hasPart
                targetRef: { $hasPrefix: 'domain:' }
    - entity-card:catalog/has-systems:
        config:
          type: content
          filter:
            kind: domain
            relations:
              $contains:
                type: hasPart
                targetRef: { $hasPrefix: 'system:' }

    - entity-card:catalog-graph/relations:
        config:
          type: content
          filter: { $not: { kind: { $in: ['user', 'domain'] } } }

organization:
  name: mozilla

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007

  actions:
    pluginSources:
      - catalog

  csp:
    connect-src: ["'self'", 'http:', 'https:']

  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

  cache:
    store: redis
    connection: redis://127.0.0.1:6379

  reading:
    allow:
      # Wildcard matches any *.services.mozilla.com subdomain (suffix match),
      # so overlays can $text/$json other Mozilla service specs without
      # editing the allowlist per host. Quoted because a leading '*' is a
      # YAML alias indicator.
      - host: '*.services.mozilla.com'

integrations:
  github:
    - host: github.com
      # This is a Personal Access Token or PAT from GitHub.
      # In stage and prod we rely on a Github app
      token: ${GITHUB_TOKEN}

proxy:
  endpoints:
    # Grafana sits behind IAP. In deployed environments the backend reaches it
    # over the cluster-internal URL (no IAP) with a service-account token. For
    # local dev, point GRAFANA_INTERNAL_URL at a `kubectl port-forward` of the
    # Grafana service (these env vars are unset locally by default, like the
    # GitHub/Postgres ones above).
    '/grafana/api':
      target: ${GRAFANA_INTERNAL_URL}
      headers:
        Authorization: Bearer ${GRAFANA_TOKEN}
        # Host: ${GRAFANA_PUBLIC_URL}

# @backstage-community/plugin-grafana. `domain` is the user-facing (public,
# IAP-protected) Grafana URL used to build clickable dashboard links — the
# browser reaches it with the user's existing IAP session. API calls go via
# the internal proxy endpoint above, so IAP is never in the backend's path.
grafana:
  domain: ${GRAFANA_PUBLIC_URL}
  unifiedAlerting: true

# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'local' # Alternatives - 'external'
  generator:
    runIn: 'docker' # Alternatives - 'local'
  publisher:
    type: 'local' # Alternatives - 'googleGcs' or 'awsS3'. Read documentation for using alternatives.

auth:
  # see https://backstage.io/docs/auth/ to learn about auth providers
  environment: dev
  providers:
    # See https://backstage.io/docs/auth/guest/provider.
    # In dev we sign the guest in as a real catalog user so ownership
    # filters ("My Groups", "owned by me") and permission checks behave
    # as they would for the SSO'd user.
    guest:
      userEntityRef: user:workgroups/wstuckey-mozilla-com
      ownershipEntityRefs:
        - user:workgroups/wstuckey-mozilla-com
  experimentalClientIdMetadataDocuments:
    enabled: true

# scaffolder:
# see https://backstage.io/docs/features/software-templates/configuration for software template options

catalog:
  providers:
    mozcloud:
      tenants:
        overlay:
          enabled: true
          repoUrlTemplate: 'https://github.com/mozilla/{function}-infra'
          pathTemplate: '{app_code}/catalog-info.yaml'
          branch: main
        sources:
          # Reads `mozdata.mozcloud.tenants` directly.
          # Derives Domain, System (tenant) and Services.
          tenants:
            bigquery:
              project: mozdata
              dataset: mozcloud
              table: tenants
              billingProject: moz-fx-backstage-nonprod
          # Joins `tenants.globals.deployment.charts[]` with
          # `tenants_deployed_charts` to produce one row per (tenant, chart)
          # carrying the declared chart metadata + the actual deployment
          # tree (realm -> environments -> regions). Consumed by the
          # tenant entity provider as a second source to enrich chart
          # Components with deployment annotations.
          charts:
            bigquery:
              project: mozdata
              dataset: mozcloud
              billingProject: moz-fx-backstage-nonprod
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 5 }
          initialDelay: { seconds: 30 }
      workgroups:
        sources:
          # Reads `mozdata.mozcloud.workgroups` directly (one row per
          # workgroup with nested subgroups). Drives Group entities only;
          # human users come from the `users` source below.
          workgroups:
            bigquery:
              project: mozdata
              dataset: mozcloud
              billingProject: moz-fx-backstage-nonprod
          # Aggregates `mozdata.mozcloud.workgroup_subgroup_members` (where
          # `member_type='user'`) into one row per human with GitHub
          # identity and their (workgroup, subgroup) memberships. Drives
          # User entities and back-fills subgroup Group `spec.members`.
          users:
            bigquery:
              project: mozdata
              dataset: mozcloud
              billingProject: moz-fx-backstage-nonprod
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 5 }
          initialDelay: { seconds: 30 }
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration

  rules:
    - allow: [Component, System, API, Resource, Location, User, Group]

  # locations:
  #   - type: file
  #     target: scaffolder-templates/*/template.yaml
  #     rules:
  #       - allow:
  #           - Template

# see https://backstage.io/docs/permissions/getting-started for more on the permission framework
permission:
  # setting this to `false` will disable permissions
  enabled: true

mcpActions:
  servers:
    catalog:
      name: 'Mozilla Service Catalog'
      description: 'Tools for interacting with the software catalog'
      filter:
        include:
          - id: 'catalog:*'
